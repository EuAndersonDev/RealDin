<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/css/global.css" />
        <link rel="stylesheet" href="/css/pages/forgot-password.css" />
        <link
            rel="icon"
            type="image/png"
            href="/assets/imgs/LogoHead.png"
            width="50"
            height="50"
        />
        <script src="/js/services/session/session.js" defer></script>
        <title>Recuperar senha - RealDin</title>
        <script src="/js/pages/forgot-password.js" defer></script>
        <script src="/js/main.js" defer></script>
        <link rel="stylesheet" href="/css/components/toast.css" />
        <script src="/js/components/toast.js"></script>
    </head>
    <body>
        <div class="login">
            <!-- Blur decorativo -->
            <div class="overlay-blur overlay-blur-1"></div>
            <div class="overlay-blur overlay-blur-2"></div>
            <div class="overlay-blur overlay-blur-3"></div>

            <!-- Logo -->
            <img
                class="logo"
                src="../assets/imgs/Logo.svg"
                alt="RealDin Logo"
            />

            <!-- Hero esquerda -->
            <div class="hero-content">
                <h1 class="hero-title">Esqueceu sua senha?</h1>
                <p class="hero-subtitle">
                    Sem problema! Informe seu e-mail cadastrado e redefina sua
                    senha agora mesmo.
                </p>
            </div>

            <!-- Card -->
            <div class="login-container">
                <!-- Ícone decorativo -->
                <div class="card-icon">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <rect x="2" y="4" width="20" height="16" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                </div>

                <div>
                    <h2 class="login-title">Recuperar senha</h2>
                    <p class="login-subtitle">
                        Digite o e-mail cadastrado para validar sua conta e
                        criar uma nova senha.
                    </p>
                </div>

                <!-- Formulário (some ao enviar) -->
                <form class="login-form" id="forgotForm">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="seu@email.com"
                            autocomplete="email"
                            required
                        />
                    </div>

                    <div class="form-group reset-only" id="newPasswordGroup">
                        <label for="newPassword">Nova senha</label>
                        <input
                            type="password"
                            id="newPassword"
                            placeholder="Mínimo 8 caracteres"
                            autocomplete="new-password"
                        />
                    </div>

                    <div
                        class="form-group reset-only"
                        id="confirmPasswordGroup"
                    >
                        <label for="confirmPassword"
                            >Confirmar nova senha</label
                        >
                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Repita a nova senha"
                            autocomplete="new-password"
                        />
                    </div>

                    <button type="submit" class="btn-login">
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path d="M22 2 11 13" />
                            <path d="m22 2-7 20-4-9-9-4 20-7z" />
                        </svg>
                        <span id="submitLabel">Verificar e-mail</span>
                    </button>
                </form>

                <!-- Feedback de sucesso -->
                <div
                    class="success-message"
                    id="successMessage"
                    role="alert"
                    aria-live="polite"
                >
                    <div class="success-icon">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path d="M20 6 9 17l-5-5" />
                        </svg>
                    </div>
                    <p class="success-title">Senha redefinida!</p>
                    <p class="success-desc">
                        Senha atualizada para
                        <span id="sentEmail"></span>.<br />
                        Você já pode entrar com a nova senha.
                    </p>
                </div>

                <!-- Voltar ao login -->
                <div class="footer-links">
                    <a href="./login.html" class="back-link">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path d="m15 18-6-6 6-6" />
                        </svg>
                        Voltar para o login
                    </a>
                </div>
            </div>
        </div>

        <!-- VLibras -->
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>

        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>
            new window.VLibras.Widget("https://vlibras.gov.br/app");
        </script>
    </body>
</html>
