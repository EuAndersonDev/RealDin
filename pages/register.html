<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/css/global.css" />
        <link rel="stylesheet" href="/css/pages/register.css" />
        <link
            rel="icon"
            type="image/png"
            href="/assets/imgs/LogoHead.png"
            width="50"
            height="50"
        />
        <script src="/js/services/session/session.js" defer></script>
        <script src="/js/services/forms.js" defer></script>
        <script src="/js/pages/register.js" defer></script>
        <script src="/js/main.js" defer></script>
        <title>Register</title>
        <link rel="stylesheet" href="/css/components/toast.css" />
        <script src="/js/components/toast.js"></script>
    </head>
    <body>
        <div class="login">
            <!-- Blur decorativo -->
            <div class="overlay-blur overlay-blur-1"></div>
            <div class="overlay-blur overlay-blur-2"></div>
            <div class="overlay-blur overlay-blur-3"></div>

            <!-- Logo -->
            <img
                class="logo"
                src="../assets/imgs/Logo.svg"
                alt="RealDin Logo"
            />

            <!-- Hero esquerda -->
            <div class="hero-content">
                <h1 class="hero-title">Comece sua jornada financeira</h1>
                <p class="hero-subtitle">
                    Crie sua conta gratuitamente e tenha acesso a todos os
                    conteúdos e ferramentas do RealDin.
                </p>
            </div>

            <!-- Card de cadastro -->
            <div class="login-container">
                <h2 class="login-title">Criar conta</h2>
                <p class="login-subtitle">
                    Preencha os dados abaixo para se cadastrar
                </p>

                <form class="login-form" id="registerForm">
                    <!-- Nome + Sobrenome -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">Nome</label>
                            <input
                                type="text"
                                id="firstName"
                                placeholder="João"
                                autocomplete="given-name"
                            />
                        </div>
                        <div class="form-group">
                            <label for="lastName">Sobrenome</label>
                            <input
                                type="text"
                                id="lastName"
                                placeholder="Silva"
                                autocomplete="family-name"
                            />
                        </div>
                    </div>

                    <!-- E-mail -->
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="seu@email.com"
                            autocomplete="email"
                        />
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <div class="password-input-wrapper">
                            <input
                                type="password"
                                id="password"
                                placeholder="Mínimo 8 caracteres"
                                autocomplete="new-password"
                            />
                            <button
                                type="button"
                                class="toggle-password"
                                aria-label="Mostrar senha"
                                id="togglePassword"
                            >
                                <!-- ícone olho inline para não depender do asset -->
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    aria-hidden="true"
                                >
                                    <path
                                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                                    />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                        <div class="password-strength" id="strengthBars">
                            <div class="strength-bar" id="bar1"></div>
                            <div class="strength-bar" id="bar2"></div>
                            <div class="strength-bar" id="bar3"></div>
                        </div>
                    </div>

                    <!-- Confirmar senha -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar senha</label>
                        <div class="password-input-wrapper">
                            <input
                                type="password"
                                id="confirmPassword"
                                placeholder="Repita sua senha"
                                autocomplete="new-password"
                            />
                            <button
                                type="button"
                                class="toggle-password"
                                aria-label="Mostrar senha"
                                id="toggleConfirmPassword"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    aria-hidden="true"
                                >
                                    <path
                                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                                    />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Termos -->
                    <div class="terms-group">
                        <input type="checkbox" id="terms" />
                        <label for="terms">
                            Li e aceito os
                            <a href="./terms.html">Termos de Uso</a>
                            e a
                            <a href="./privacy.html">Política de Privacidade</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-login">
                        <!-- ícone inline -->
                        <svg
                            width="22"
                            height="22"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path
                                d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"
                            />
                            <circle cx="9" cy="7" r="4" />
                            <line x1="19" y1="8" x2="19" y2="14" />
                            <line x1="22" y1="11" x2="16" y2="11" />
                        </svg>
                        <span>Cadastrar</span>
                    </button>
                </form>

                <p class="signup-text">
                    Já tem uma conta?
                    <a href="./login.html" class="signup-link">Entrar</a>
                </p>
            </div>
        </div>
    </body>
</html>
