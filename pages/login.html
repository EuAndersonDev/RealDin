<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/pages/login.css" />
    <title>Login - RealDin</title>
    <script src="/js/services/session/session.js" defer></script>
    <script src="/js/services/forms.js" defer></script>
    <script src="/js/pages/login.js" defer></script>
    <link rel="stylesheet" href="/css/components/toast.css" />
    <script src="/js/components/toast.js"></script>
  </head>
  <body>
    <div class="login">
      <!-- Elementos decorativos de blur -->
      <div class="overlay-blur overlay-blur-1"></div>
      <div class="overlay-blur overlay-blur-2"></div>
      <div class="overlay-blur overlay-blur-3"></div>

      <!-- Logo -->
      <img
        class="logo"
        src="../assets/imgs/Logo.svg"
        alt="RealDin Logo"
      />

      <!-- Conteúdo da esquerda -->
      <div class="hero-content">
        <h1 class="hero-title">Para conferir mais conteúdos</h1>
        <p class="hero-subtitle">
          Efetue o login ou se cadastre para acessar todos os conteúdos do nosso
          site!
        </p>
      </div>

      <!-- Container de login -->
      <div class="login-container">
        <h2 class="login-title">Bem-vindo de volta</h2>
        <p class="login-subtitle">Entre na sua conta para continuar</p>

        <form class="login-form">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" />
          </div>

          <div class="form-group password-group">
            <label for="password">Senha</label>
            <div class="password-input-wrapper">
              <input type="password" id="password" placeholder="••••••••" />
              <button
                type="button"
                class="toggle-password"
                aria-label="Mostrar senha"
                id="togglePassword"
              >
                <img src="../assets/icons/loginRegister/IconOlho.svg" alt="" aria-hidden="true" />
              </button>
            </div>
          </div>

          <a href="./forgot-password.html" class="forgot-password">Esqueceu a senha?</a>

          <button type="submit" class="btn-login">
            <img src="../assets/icons/DoorButton.svg" alt="" aria-hidden="true" />
            <span>Entrar</span>
          </button>
        </form>

        <p class="signup-text">
          Não tem uma conta?
          <a href="./register.html" class="signup-link">Cadastre-se</a>
        </p>
      </div>
    </div>
  </body>
</html>
